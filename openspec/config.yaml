schema: spec-driven

context: |
  This repository is an agentic SDD/SDLC delivery shell with no current product implementation. Agents move OpenProject work packages through OpenSpec planning, implementation, Gitea review, Nexus artifact promotion, QA evidence, explicit PROD promotion, rollback, and hotfix workflows once a product stack is configured.

  Durable project intent lives in docs/. The shared delivery contract at .codex/skills/_shared/delivery-contract.md is the agent-enforced policy layer. Agents should use documented intent first, then verify against current files and live tool output before mutating state.

  Delivery tool set: OpenProject records tickets, states, and generated markers; OpenSpec records planned behavior; Gitea hosts PRs and reviews; Gitea Actions is the authoritative validation/deployment runner; Nexus stores immutable artifacts, release manifests, and preferred QA evidence bundles; Docker Desktop is the default local deployment lane; Seq, Grafana, and Dozzle support local observability.

  Product stack: unselected. Add stack-specific languages, frameworks, tests, quality gates, skills, MCPs, and deployment targets only when the new product is defined.

  QA automation should prefer repo-native tests for repeatable implementation checks. Playwright guidance remains available for future browser-visible behavior when a UI exists.

  Recommendation audits scan the repository for detected tools, frameworks, environments, test frameworks, QA practices, code standards, web UI, REST/API, and security signals. project-guidance-discover owns project guidance suggestions and should avoid recommending stack-specific items before a stack exists.

  Use official-first research for platform and tooling guidance. Prefer official Gitea, Sonatype Nexus, Docker Desktop, Kubernetes, Grafana, Seq, Dozzle, Playwright, and selected future stack sources.

rules:
  proposal:
    - Include the OpenProject work package context when available.
    - Name impacted capabilities and the user-visible goal.
    - Include non-goals when the boundary matters.
  design:
    - Record meaningful architecture or tooling decisions.
    - Include alternatives considered when a choice is not obvious.
    - Call out source-of-truth impacts across docs, skills, workflows, and config.
  tasks:
    - Include implementation, tests, quality gates, and docs/context review.
    - Include recommendation-audit updates when tooling or stack guidance changes.
    - Include a Review Workload Forecast with estimated changed lines, 400-line budget risk, chained PR recommendation, apply decision, delivery strategy, and suggested work units.
    - Keep work units behavior-oriented with code, tests, and docs together; do not split only by file type.
  spec:
    - Use SHALL requirements with observable scenarios.
    - Avoid implementation-only details unless needed to prevent ambiguity.
