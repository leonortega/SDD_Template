schema: spec-driven

context: |
  This repository is an agentic SDD/SDLC delivery lab. Agents move Plane tickets through OpenSpec planning, implementation, Gitea review, Nexus artifact promotion, Azure DEV/QA/PROD deployment, E2E QA evidence, explicit PROD promotion, rollback, and hotfix workflows.

  Durable project intent lives in docs/. The shared delivery contract at .codex/skills/_shared/delivery-contract.md is the agent-enforced policy layer. Agents should use documented intent first, then verify against current files and live tool output before mutating state.

  Delivery tool set: Plane records tickets, states, and generated markers; OpenSpec records planned behavior; Gitea hosts PRs and reviews; Gitea Actions is the authoritative PR validation/deployment runner; Nexus stores immutable artifacts, release manifests, and preferred QA evidence bundles; Azure App Service hosts DEV, QA, and PROD application runtimes; Prometheus and Grafana provide local and Azure health visibility.

  Application stack: .NET 10, ASP.NET Core, Blazor, xUnit, Microsoft.AspNetCore.Mvc.Testing, Microsoft.NET.Test.Sdk, and coverlet coverage. Quality gates include restore, format verification, release build, tests with coverage, dependency vulnerability audit, secret scan, and Trivy filesystem scan.

  QA automation should prefer repo-native tests for repeatable checks and Browser/Playwright-style automation for rendered Blazor behavior when configured. Browser checks should assert user-visible behavior, console/network health, responsive behavior when relevant, and evidence validity.

  Recommended skills are copied manually from repository sources: read the source SKILL.md, create .codex/skills/{skill-name}/, write the copied SKILL.md, and copy only required referenced scripts or templates. Do not copy secrets, local state, caches, unrelated files, or generated artifacts. Plugins and MCPs use manual configuration unless an explicit later task authorizes otherwise. Plane MCP is not used for ticket delivery; repo-local skills use the configured Plane API.

  Use official-first research for platform and tooling guidance. Prefer Microsoft Learn for .NET, ASP.NET Core, Blazor, Azure App Service, and architecture; Playwright docs for browser automation; and official Gitea, Sonatype Nexus, Prometheus, and Grafana docs for those tools.

rules:
  proposal:
    - Include the Plane ticket context when available.
    - Name impacted capabilities and the user-visible goal.
    - Include non-goals when the boundary matters.
  design:
    - Record meaningful architecture or tooling decisions.
    - Include alternatives considered when a choice is not obvious.
    - Call out source-of-truth impacts across docs, skills, workflows, and config.
  tasks:
    - Include implementation, tests, quality gates, and docs/context review.
    - Include recommendation-audit updates when tooling or stack guidance changes.
  spec:
    - Use SHALL requirements with observable scenarios.
    - Avoid implementation-only details unless needed to prevent ambiguity.
