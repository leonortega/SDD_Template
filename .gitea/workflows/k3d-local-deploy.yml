name: k3d local deploy

on:
  push:
    branches:
      - dev
      - qa-local/**
  workflow_dispatch:
    inputs:
      environment:
        description: Local target environment
        required: true
        default: dev
      artifact_commit_sha:
        description: Existing Nexus artifact commit SHA for local PROD promotion
        required: false
        default: ''
      release_version:
        description: Final release version for local PROD metadata
        required: false
        default: ''
      source_rc_version:
        description: Source RC version approved by QA
        required: false
        default: ''

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.classify.outputs.app_changed }}
      deploy_allowed: ${{ steps.classify.outputs.deploy_allowed }}
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          repo_url="${repo_url/localhost/host.docker.internal}"
          repo_url="${repo_url/gitea/host.docker.internal}"

          git init .
          git remote add origin "$repo_url"
          git fetch origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

          before="${{ github.event.before }}"
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            git fetch origin "$before" || true
          fi

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy_allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$before" "$GITHUB_SHA")"
          else
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")"
          fi

          app_changed=false
          while IFS= read -r path; do
            case "$path" in
              src/*|tests/*|infra/k3d/*)
                app_changed=true
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          ticket_key_pattern="$(jq -r '.workflow.ticketKeyPattern // empty' .codex/project-profile.json)"
          test -n "$ticket_key_pattern"

          commit_message="${{ github.event.head_commit.message }}"
          ticket_key=""
          if [[ "$commit_message" =~ ^($ticket_key_pattern) ]]; then
            ticket_key="${BASH_REMATCH[1]}"
          elif [[ "$commit_message" =~ Merge\ pull\ request.*\'($ticket_key_pattern): ]]; then
            ticket_key="${BASH_REMATCH[1]}"
          fi
          deploy_allowed=false
          if [ -n "$ticket_key" ]; then
            deploy_allowed=true
          fi

          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"
          echo "deploy_allowed=$deploy_allowed" >> "$GITHUB_OUTPUT"

  build-container-images:
    needs: classify-changes
    if: (github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs.classify-changes.outputs.app_changed == 'true' && needs.classify-changes.outputs.deploy_allowed == 'true') || github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'qa'
    runs-on: ubuntu-latest
    container:
      image: agentic/dotnet-ci:10.0.300-tools-1
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          repo_url="${repo_url/localhost/host.docker.internal}"
          repo_url="${repo_url/gitea/host.docker.internal}"

          git init .
          git remote add origin "$repo_url"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Build and push app images
        shell: bash
        run: |
          set -euo pipefail

          test -n "$NEXUS_DOCKER_REGISTRY"
          echo "$NEXUS_DOCKER_PASSWORD" | docker login "$NEXUS_DOCKER_REGISTRY" --username "$NEXUS_DOCKER_USERNAME" --password-stdin

          mkdir -p artifacts
          git rev-parse HEAD > artifacts/commit.sha
          commit_sha="$(cat artifacts/commit.sha)"
          ticket_key_pattern="$(dotnet run --project tools/SDDTemplate.DeliveryTools/SDDTemplate.DeliveryTools.csproj -- ReadProjectProfile --path .codex/project-profile.json)"
          commit_message="$(git log -1 --pretty=%B)"
          ticket_key="$(dotnet run --project tools/SDDTemplate.DeliveryTools/SDDTemplate.DeliveryTools.csproj -- ExtractTicketKey --pattern "$ticket_key_pattern" --message "$commit_message" --fallback manual-dispatch)"

          site_tag="$NEXUS_DOCKER_REGISTRY/sddtemplate/site:$commit_sha"
          api_tag="$NEXUS_DOCKER_REGISTRY/sddtemplate/api:$commit_sha"

          docker build -f src/SDDTemplate.Site/Dockerfile -t "$site_tag" .
          docker build -f src/SDDTemplate.Api/Dockerfile -t "$api_tag" .
          docker push "$site_tag"
          docker push "$api_tag"

          site_ref="$(docker image inspect --format='{{index .RepoDigests 0}}' "$site_tag")"
          api_ref="$(docker image inspect --format='{{index .RepoDigests 0}}' "$api_tag")"
          test -n "$site_ref"
          test -n "$api_ref"
          site_digest="${site_ref#*@}"
          api_digest="${api_ref#*@}"

          jq -n \
            --arg commitSha "$commit_sha" \
            --arg ticketKey "$ticket_key" \
            --arg registry "$NEXUS_DOCKER_REGISTRY" \
            --arg siteImage "$NEXUS_DOCKER_REGISTRY/sddtemplate/site" \
            --arg siteTag "$commit_sha" \
            --arg siteDigest "$site_digest" \
            --arg siteReference "$site_ref" \
            --arg apiImage "$NEXUS_DOCKER_REGISTRY/sddtemplate/api" \
            --arg apiTag "$commit_sha" \
            --arg apiDigest "$api_digest" \
            --arg apiReference "$api_ref" \
            '{
              schemaVersion: 1,
              commitSha: $commitSha,
              ticketKey: $ticketKey,
              registry: $registry,
              images: [
                { appId: "site", image: $siteImage, tag: $siteTag, digest: $siteDigest, reference: $siteReference },
                { appId: "api", image: $apiImage, tag: $apiTag, digest: $apiDigest, reference: $apiReference }
              ]
            }' > artifacts/container-images.json

          dotnet run --project tools/SDDTemplate.DeliveryTools/SDDTemplate.DeliveryTools.csproj -- CreateReleaseManifest --output artifacts/release.json --commit-sha "$commit_sha" --checksum "$site_digest" --artifact-url "$site_ref" --ticket-key "$ticket_key" --version-status "local container candidate"
          tmp="$(mktemp)"
          jq --slurpfile containerImages artifacts/container-images.json '.deploymentProvider = "k3d" | .containerImages = $containerImages[0].images | .containerImagesUrl = "app/" + .commitSha + "/container-images.json"' artifacts/release.json > "$tmp"
          mv "$tmp" artifacts/release.json
          dotnet run --project tools/SDDTemplate.DeliveryTools/SDDTemplate.DeliveryTools.csproj -- ValidateReleaseManifest --path artifacts/release.json

          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/container-images.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${commit_sha}/container-images.json"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/commit.sha "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${commit_sha}/commit.sha"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/release.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${commit_sha}/release.json"
        env:
          NEXUS_DOCKER_REGISTRY: ${{ secrets.NEXUS_DOCKER_REGISTRY }}
          NEXUS_DOCKER_USERNAME: ${{ secrets.NEXUS_DOCKER_USERNAME }}
          NEXUS_DOCKER_PASSWORD: ${{ secrets.NEXUS_DOCKER_PASSWORD }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

  deploy-local-dev:
    needs:
      - classify-changes
      - build-container-images
    if: (github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs.classify-changes.outputs.app_changed == 'true' && needs.classify-changes.outputs.deploy_allowed == 'true') || github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'qa'
    runs-on: ubuntu-latest
    container:
      image: agentic/dotnet-ci:10.0.300-tools-1
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          repo_url="${repo_url/localhost/host.docker.internal}"
          repo_url="${repo_url/gitea/host.docker.internal}"

          git init .
          git remote add origin "$repo_url"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Download container metadata
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" -o container-images.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${GITHUB_SHA}/container-images.json"
          jq -e '.images[] | select(.appId == "site") | .reference | test("@sha256:")' container-images.json
          jq -e '.images[] | select(.appId == "api") | .reference | test("@sha256:")' container-images.json
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

      - name: Configure k3d kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.kube"
          printf '%s' "$K3D_KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context | grep -qx "k3d-sdd-template"
        env:
          K3D_KUBECONFIG_B64: ${{ secrets.K3D_KUBECONFIG_B64 }}

      - name: Deploy DEV namespace
        shell: bash
        run: |
          set -euo pipefail

          wait_for_direct_health() {
            environment="$1"
            commit_sha="$2"
            output_dir="$3"
            site_url="$4"
            api_url="$5"
            mkdir -p "$output_dir"

            site_value=""
            api_value=""
            for attempt in 1 2 3 4 5 6; do
              site_value="0"
              api_value="0"
              if curl --fail --silent --show-error --location "$site_url" -o "$output_dir/site-health.json" && jq -e '.status == "ok"' "$output_dir/site-health.json" >/dev/null; then
                site_value="1"
              fi
              if curl --fail --silent --show-error --location "$api_url" -o "$output_dir/api-health.json" && jq -e '.status == "ok"' "$output_dir/api-health.json" >/dev/null; then
                api_value="1"
              fi
              if [ "$site_value" = "1" ] && [ "$api_value" = "1" ]; then
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                sleep 10
              fi
            done

            site_status="$([ "$site_value" = "1" ] && echo PASS || echo FAIL)"
            api_status="$([ "$api_value" = "1" ] && echo PASS || echo FAIL)"
            env_upper="$(printf '%s' "$environment" | tr '[:lower:]' '[:upper:]')"
            jq -n \
              --arg commitSha "$commit_sha" \
              --arg environment "$env_upper" \
              --arg provider "k3d" \
              --arg siteHealthStatus "$site_status" \
              --arg apiHealthStatus "$api_status" \
              --arg siteUrl "$site_url" \
              --arg apiUrl "$api_url" \
              --arg checkedAtUtc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                commitSha: $commitSha,
                environment: $environment,
                provider: $provider,
                siteHealthStatus: $siteHealthStatus,
                apiHealthStatus: $apiHealthStatus,
                healthCheckMode: "direct-http",
                siteUrl: $siteUrl,
                apiUrl: $apiUrl,
                checkedAtUtc: $checkedAtUtc
              }' > "$output_dir/monitoring-summary.json"

            [ "$site_status" = "PASS" ] && [ "$api_status" = "PASS" ]
          }

          site_image="$(jq -r '.images[] | select(.appId == "site") | .reference' container-images.json)"
          api_image="$(jq -r '.images[] | select(.appId == "api") | .reference' container-images.json)"
          bash infra/k3d/deploy-local-lab.sh --environment dev --namespace sdd-dev --site-image "$site_image" --api-image "$api_image" --commit-sha "$GITHUB_SHA" --site-host "${K3D_DEV_SITE_HOST:-site.dev.sdd.localhost}" --api-host "${K3D_DEV_API_HOST:-api.dev.sdd.localhost}"
          wait_for_direct_health dev "$GITHUB_SHA" artifacts/k3d-observability/dev "${K3D_DEV_SITE_URL:-http://host.docker.internal:18081/health}" "${K3D_DEV_API_URL:-http://host.docker.internal:18082/health}"

          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/k3d-observability/dev/monitoring-summary.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${GITHUB_SHA}/monitoring-summary-dev.json"
        env:
          NEXUS_DOCKER_REGISTRY: ${{ secrets.NEXUS_DOCKER_REGISTRY }}
          NEXUS_DOCKER_USERNAME: ${{ secrets.NEXUS_DOCKER_USERNAME }}
          NEXUS_DOCKER_PASSWORD: ${{ secrets.NEXUS_DOCKER_PASSWORD }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

  deploy-local-qa:
    needs:
      - classify-changes
      - deploy-local-dev
    if: (github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs.classify-changes.outputs.app_changed == 'true' && needs.classify-changes.outputs.deploy_allowed == 'true') || github.event.inputs.environment == 'qa'
    runs-on: ubuntu-latest
    container:
      image: agentic/dotnet-ci:10.0.300-tools-1
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          repo_url="${repo_url/localhost/host.docker.internal}"
          repo_url="${repo_url/gitea/host.docker.internal}"

          git init .
          git remote add origin "$repo_url"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Download container metadata
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" -o container-images.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${GITHUB_SHA}/container-images.json"
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

      - name: Configure k3d kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          printf '%s' "$K3D_KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context | grep -qx "k3d-sdd-template"
        env:
          K3D_KUBECONFIG_B64: ${{ secrets.K3D_KUBECONFIG_B64 }}

      - name: Deploy QA namespace
        shell: bash
        run: |
          set -euo pipefail

          wait_for_direct_health() {
            environment="$1"
            commit_sha="$2"
            output_dir="$3"
            site_url="$4"
            api_url="$5"
            mkdir -p "$output_dir"

            site_value=""
            api_value=""
            for attempt in 1 2 3 4 5 6; do
              site_value="0"
              api_value="0"
              if curl --fail --silent --show-error --location "$site_url" -o "$output_dir/site-health.json" && jq -e '.status == "ok"' "$output_dir/site-health.json" >/dev/null; then
                site_value="1"
              fi
              if curl --fail --silent --show-error --location "$api_url" -o "$output_dir/api-health.json" && jq -e '.status == "ok"' "$output_dir/api-health.json" >/dev/null; then
                api_value="1"
              fi
              if [ "$site_value" = "1" ] && [ "$api_value" = "1" ]; then
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                sleep 10
              fi
            done

            site_status="$([ "$site_value" = "1" ] && echo PASS || echo FAIL)"
            api_status="$([ "$api_value" = "1" ] && echo PASS || echo FAIL)"
            env_upper="$(printf '%s' "$environment" | tr '[:lower:]' '[:upper:]')"
            jq -n \
              --arg commitSha "$commit_sha" \
              --arg environment "$env_upper" \
              --arg provider "k3d" \
              --arg siteHealthStatus "$site_status" \
              --arg apiHealthStatus "$api_status" \
              --arg siteUrl "$site_url" \
              --arg apiUrl "$api_url" \
              --arg checkedAtUtc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                commitSha: $commitSha,
                environment: $environment,
                provider: $provider,
                siteHealthStatus: $siteHealthStatus,
                apiHealthStatus: $apiHealthStatus,
                healthCheckMode: "direct-http",
                siteUrl: $siteUrl,
                apiUrl: $apiUrl,
                checkedAtUtc: $checkedAtUtc
              }' > "$output_dir/monitoring-summary.json"

            [ "$site_status" = "PASS" ] && [ "$api_status" = "PASS" ]
          }

          site_image="$(jq -r '.images[] | select(.appId == "site") | .reference' container-images.json)"
          api_image="$(jq -r '.images[] | select(.appId == "api") | .reference' container-images.json)"
          bash infra/k3d/deploy-local-lab.sh --environment qa --namespace sdd-qa --site-image "$site_image" --api-image "$api_image" --commit-sha "$GITHUB_SHA" --site-host "${K3D_QA_SITE_HOST:-site.qa.sdd.localhost}" --api-host "${K3D_QA_API_HOST:-api.qa.sdd.localhost}"
          wait_for_direct_health qa "$GITHUB_SHA" artifacts/k3d-observability/qa "${K3D_QA_SITE_URL:-http://host.docker.internal:18083/health}" "${K3D_QA_API_URL:-http://host.docker.internal:18084/health}"

          jq -n \
            --arg environment "QA" \
            --arg commitSha "$GITHUB_SHA" \
            --arg siteUrl "${K3D_QA_SITE_URL:-http://host.docker.internal:18083}" \
            --arg apiUrl "${K3D_QA_API_URL:-http://host.docker.internal:18084}" \
            --arg workflowRunUrl "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg publishedAtUtc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              environment: $environment,
              deploymentProvider: "k3d",
              commitSha: $commitSha,
              siteUrl: $siteUrl,
              apiUrl: $apiUrl,
              workflowRunUrl: $workflowRunUrl,
              publishedAtUtc: $publishedAtUtc
            }' > qa-targets.json

          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file qa-targets.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${GITHUB_SHA}/qa-targets.json"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/k3d-observability/qa/monitoring-summary.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${GITHUB_SHA}/monitoring-summary.json"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/k3d-observability/qa/monitoring-summary.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${GITHUB_SHA}/qa-observability.json"
        env:
          NEXUS_DOCKER_REGISTRY: ${{ secrets.NEXUS_DOCKER_REGISTRY }}
          NEXUS_DOCKER_USERNAME: ${{ secrets.NEXUS_DOCKER_USERNAME }}
          NEXUS_DOCKER_PASSWORD: ${{ secrets.NEXUS_DOCKER_PASSWORD }}
          K3D_QA_SITE_URL: ${{ secrets.K3D_QA_SITE_URL }}
          K3D_QA_API_URL: ${{ secrets.K3D_QA_API_URL }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

  e2e-qa-local:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/qa-local/')
    runs-on: ubuntu-latest
    container:
      image: agentic/e2e-ci:playwright-1.57.0-1
    steps:
      - name: Checkout QA local E2E branch
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          repo_url="${repo_url/localhost/host.docker.internal}"
          repo_url="${repo_url/gitea/host.docker.internal}"

          git init .
          git remote add origin "$repo_url"
          git fetch --depth 50 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD
          git fetch --depth 50 origin dev

      - name: Resolve QA artifact commit
        shell: bash
        run: |
          set -euo pipefail

          artifact_commit_sha="$(git merge-base HEAD origin/dev)"
          test -n "$artifact_commit_sha"
          echo "E2E_ARTIFACT_COMMIT_SHA=$artifact_commit_sha" >> "$GITHUB_ENV"

          ticket_key_pattern="$(jq -r '.workflow.ticketKeyPattern // empty' .codex/project-profile.json)"
          branch_name="${GITHUB_REF#refs/heads/}"
          ticket_key="$(printf '%s\n' "$branch_name" | sed -nE "s#^qa-local/($ticket_key_pattern)(/.*)?\$#\1#p" | head -n 1)"
          test -n "$ticket_key"
          echo "E2E_TICKET_KEY=$ticket_key" >> "$GITHUB_ENV"

      - name: Install E2E dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd tests/SDDTemplate.E2ETests
          npm ci

      - name: Run local QA E2E suite and upload evidence
        shell: bash
        run: |
          set -euo pipefail

          cd tests/SDDTemplate.E2ETests
          mkdir -p evidence

          E2E_SITE_URL="${E2E_SITE_URL:-http://host.docker.internal:18083}"
          E2E_API_URL="${E2E_API_URL:-http://host.docker.internal:18084}"

          test_exit=0
          npm test || test_exit=$?

          run_id="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" -o evidence/qa-observability.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${E2E_ARTIFACT_COMMIT_SHA}/qa-observability.json" || true
          {
            echo "ticketKey=$E2E_TICKET_KEY"
            echo "artifactCommitSha=$E2E_ARTIFACT_COMMIT_SHA"
            echo "testCommitSha=$GITHUB_SHA"
            echo "deploymentProvider=k3d"
            echo "runId=$run_id"
            echo "siteUrl=$E2E_SITE_URL"
            echo "apiUrl=$E2E_API_URL"
            echo "result=$([ "$test_exit" -eq 0 ] && echo PASS || echo FAIL)"
          } > evidence/qa-e2e-summary.txt

          [ -d playwright-report ] && cp -r playwright-report evidence/
          [ -d test-results ] && cp -r test-results evidence/
          zip -r qa-e2e-evidence.zip evidence

          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file qa-e2e-evidence.zip "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${E2E_ARTIFACT_COMMIT_SHA}/qa-e2e-evidence.zip"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file qa-e2e-evidence.zip "$NEXUS_URL/repository/$NEXUS_REPOSITORY/qa/${E2E_TICKET_KEY}/${run_id}/qa-evidence.zip"

          exit "$test_exit"
        env:
          E2E_SITE_URL: ${{ secrets.K3D_QA_SITE_URL }}
          E2E_API_URL: ${{ secrets.K3D_QA_API_URL }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

  deploy-local-prod:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    container:
      image: agentic/dotnet-ci:10.0.300-tools-1
    steps:
      - name: Checkout workflow files
        shell: bash
        run: |
          set -euo pipefail

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          repo_url="${repo_url/localhost/host.docker.internal}"
          repo_url="${repo_url/gitea/host.docker.internal}"

          git init .
          git remote add origin "$repo_url"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Download QA-approved container metadata
        shell: bash
        run: |
          set -euo pipefail

          artifact_commit_sha="$ARTIFACT_COMMIT_SHA"
          test -n "$artifact_commit_sha"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" -o container-images.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${artifact_commit_sha}/container-images.json"
          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" -o release.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${artifact_commit_sha}/release.json"
          jq -e --arg commit "$artifact_commit_sha" '.commitSha == $commit and (.deploymentProvider == "k3d" or (.containerImages | type == "array"))' release.json
          jq -e '.images[] | .reference | test("@sha256:")' container-images.json
          if [ -n "$SOURCE_RC_VERSION" ]; then
            curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" -o artifact-pointer.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/rc/${SOURCE_RC_VERSION}/artifact-pointer.json"
            jq -e --arg commit "$artifact_commit_sha" '.artifactCommitSha == $commit' artifact-pointer.json
          fi
        env:
          ARTIFACT_COMMIT_SHA: ${{ github.event.inputs.artifact_commit_sha }}
          SOURCE_RC_VERSION: ${{ github.event.inputs.source_rc_version }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

      - name: Configure k3d kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          printf '%s' "$K3D_KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          kubectl config current-context | grep -qx "k3d-sdd-template"
        env:
          K3D_KUBECONFIG_B64: ${{ secrets.K3D_KUBECONFIG_B64 }}

      - name: Deploy PROD namespace
        shell: bash
        run: |
          set -euo pipefail

          wait_for_direct_health() {
            environment="$1"
            commit_sha="$2"
            output_dir="$3"
            site_url="$4"
            api_url="$5"
            mkdir -p "$output_dir"

            site_value=""
            api_value=""
            for attempt in 1 2 3 4 5 6; do
              site_value="0"
              api_value="0"
              if curl --fail --silent --show-error --location "$site_url" -o "$output_dir/site-health.json" && jq -e '.status == "ok"' "$output_dir/site-health.json" >/dev/null; then
                site_value="1"
              fi
              if curl --fail --silent --show-error --location "$api_url" -o "$output_dir/api-health.json" && jq -e '.status == "ok"' "$output_dir/api-health.json" >/dev/null; then
                api_value="1"
              fi
              if [ "$site_value" = "1" ] && [ "$api_value" = "1" ]; then
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                sleep 10
              fi
            done

            site_status="$([ "$site_value" = "1" ] && echo PASS || echo FAIL)"
            api_status="$([ "$api_value" = "1" ] && echo PASS || echo FAIL)"
            env_upper="$(printf '%s' "$environment" | tr '[:lower:]' '[:upper:]')"
            jq -n \
              --arg commitSha "$commit_sha" \
              --arg environment "$env_upper" \
              --arg provider "k3d" \
              --arg siteHealthStatus "$site_status" \
              --arg apiHealthStatus "$api_status" \
              --arg siteUrl "$site_url" \
              --arg apiUrl "$api_url" \
              --arg checkedAtUtc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                commitSha: $commitSha,
                environment: $environment,
                provider: $provider,
                siteHealthStatus: $siteHealthStatus,
                apiHealthStatus: $apiHealthStatus,
                healthCheckMode: "direct-http",
                siteUrl: $siteUrl,
                apiUrl: $apiUrl,
                checkedAtUtc: $checkedAtUtc
              }' > "$output_dir/monitoring-summary.json"

            [ "$site_status" = "PASS" ] && [ "$api_status" = "PASS" ]
          }

          site_image="$(jq -r '.images[] | select(.appId == "site") | .reference' container-images.json)"
          api_image="$(jq -r '.images[] | select(.appId == "api") | .reference' container-images.json)"
          bash infra/k3d/deploy-local-lab.sh --environment prod --namespace sdd-prod --site-image "$site_image" --api-image "$api_image" --commit-sha "$ARTIFACT_COMMIT_SHA" --site-host "${K3D_PROD_SITE_HOST:-site.prod.sdd.localhost}" --api-host "${K3D_PROD_API_HOST:-api.prod.sdd.localhost}"
          wait_for_direct_health prod "$ARTIFACT_COMMIT_SHA" artifacts/k3d-observability/prod "${K3D_PROD_SITE_URL:-http://host.docker.internal:18085/health}" "${K3D_PROD_API_URL:-http://host.docker.internal:18086/health}"

          curl --fail --user "$NEXUS_USERNAME:$NEXUS_PASSWORD" --upload-file artifacts/k3d-observability/prod/monitoring-summary.json "$NEXUS_URL/repository/$NEXUS_REPOSITORY/app/${ARTIFACT_COMMIT_SHA}/monitoring-summary-prod.json"
        env:
          NEXUS_DOCKER_REGISTRY: ${{ secrets.NEXUS_DOCKER_REGISTRY }}
          NEXUS_DOCKER_USERNAME: ${{ secrets.NEXUS_DOCKER_USERNAME }}
          NEXUS_DOCKER_PASSWORD: ${{ secrets.NEXUS_DOCKER_PASSWORD }}
          ARTIFACT_COMMIT_SHA: ${{ github.event.inputs.artifact_commit_sha }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          SOURCE_RC_VERSION: ${{ github.event.inputs.source_rc_version }}
          K3D_PROD_SITE_URL: ${{ secrets.K3D_PROD_SITE_URL }}
          K3D_PROD_API_URL: ${{ secrets.K3D_PROD_API_URL }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}
