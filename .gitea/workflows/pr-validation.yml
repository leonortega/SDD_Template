name: PR validation

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: sdd-e2e-ci:local
    steps:
      - name: Checkout
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -eo pipefail
          export GIT_TERMINAL_PROMPT=0
          TOKEN="${GITEA_TOKEN:-}"
          repo_url="http://git:${TOKEN}@host.docker.internal:3000/${GITHUB_REPOSITORY}.git"

          git init .
          git remote add origin "$repo_url"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          find . -path './.git' -prune -o -name '*.json' -print | while IFS= read -r file; do
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Secret scan (Gitleaks)
        shell: bash
        run: gitleaks detect --source . --redact --no-git

      - name: SAST scan (Semgrep)
        shell: bash
        run: |
          set -euo pipefail
          # Read stack-specific semgrep rules from committed config, fallback to broad rules
          if [ -f .semgrep-rules.json ]; then
            RULES=$(python3 -c "
import json
data = json.load(open('.semgrep-rules.json'))
rules = data.get('rules', [])
for r in rules:
    print(r)
" 2>/dev/null)
          fi
          if [ -z "${RULES:-}" ]; then
            RULES="p/typescript p/javascript p/python p/csharp"
          fi
          CONFIG_FLAGS=""
          for r in $RULES; do
            CONFIG_FLAGS="$CONFIG_FLAGS --config $r"
          done
          semgrep scan $CONFIG_FLAGS --error --verbose . 2>&1

      - name: SCA scan (Trivy)
        shell: bash
        run: trivy fs --format table --exit-code 1 --no-progress . 2>&1

      - name: IaC scan (Checkov)
        shell: bash
        run: checkov -d . --compact 2>&1
