name: Package and deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev

jobs:
  no-product-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Report disabled deployment
        shell: bash
        run: |
          set -euo pipefail
          echo "No product app targets are configured. Add infra/deployment/apps.json entries with the next product stack."
