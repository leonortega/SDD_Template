# ── K8s Health Alerts ──────────────────────────────────────────────────
#
# These alerts monitor K8s LoadBalancer health endpoints on Docker Desktop.
# K8s services use dynamic nodePorts in the 30000-32767 range.
# After deployment, run `setup-k8s-access` to discover current URLs.
#
# The old static-port alerts (18081-18086) have been removed — they were
# for the pre-K8s process-based deployment and would fire false positives.
#
# To re-enable monitoring:
#   1. Deploy apps to K8s via the CI pipeline
#   2. Run: python -m tools.sdd_cli environment-lab setup-k8s-access
#   3. Note the nodePort for each environment/app
#   4. Copy the relevant alert blocks below and update the URLs
#
# Alternative: CI publishes `app/latest/env-urls-{env}.json` to Nexus
# which contains the current URLs for each deployment.
#
apiVersion: 1

deleteRules:
  - orgId: 1
    uid: agentic-e2e-health-down

groups:
  - orgId: 1
    name: Agentic E2E Health
    folder: Agentic E2E
    interval: 60s
    rules: []

