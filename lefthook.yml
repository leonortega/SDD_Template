pre-commit:
  commands:
    dotnet-format-verify:
      run: dotnet format SDDTemplate.slnx --verify-no-changes
      glob: "**/*.{cs,csproj,sln,slnx,props,targets}"
    gitleaks-staged:
      run: gitleaks protect --staged --redact

commit-msg:
  commands:
    require-ticket:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File .githooks/require-ticket.ps1 "{1}"
