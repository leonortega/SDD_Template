apiVersion: 1

deleteRules:
  - orgId: 1
    uid: agentic-e2e-health-down

groups:
  - orgId: 1
    name: Agentic E2E Health
    folder: Agentic E2E
    interval: 60s
    rules:
      - uid: agentic-e2e-dev-site-health-down
        title: DEV site /health down
        condition: C
        data:
          - refId: A
            datasourceUid: infinity-health
            relativeTimeRange:
              from: 60
              to: 0
            model:
              columns: []
              computed_columns:
                - selector: "status == 'ok' ? 1 : 0"
                  text: up
                  type: number
              format: table
              json_options:
                columnar: false
                root_is_not_array: true
              parser: backend
              refId: A
              root_selector: ""
              source: url
              type: json
              url: http://host.docker.internal:18081/health
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              expression: B
              refId: C
              type: threshold
        for: ${GRAFANA_HEALTH_ALERT_FOR}
        noDataState: OK
        execErrState: OK
        annotations:
          summary: 'DEV site /health is down for the configured duration.'
        labels:
          service: agentic-e2e
          signal: health
          environment: dev
          app: site
