apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Infinity Health
    type: yesoreyeram-infinity-datasource
    uid: infinity-health
    access: proxy
    editable: true
    jsonData:
      allowedHosts:
        - http://host.docker.internal:*
        - http://localhost:*
        - http://host.docker.internal:8088
        - http://host.docker.internal:3000
