name: agentic-monitoring

networks:
  monitoring:

volumes:
  grafana-data:

services:
  dozzle:
    image: amir20/dozzle:v10.6.2
    container_name: agentic-dozzle
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:13.0.1-security-01
    container_name: agentic-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GRAFANA_AZURE_TENANT_ID: ${GRAFANA_AZURE_TENANT_ID:-}
      GRAFANA_AZURE_CLIENT_ID: ${GRAFANA_AZURE_CLIENT_ID:-}
      GRAFANA_AZURE_CLIENT_SECRET: ${GRAFANA_AZURE_CLIENT_SECRET:-}
      GRAFANA_AZURE_SUBSCRIPTION_ID: ${GRAFANA_AZURE_SUBSCRIPTION_ID:-}
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/dashboards.local:/var/lib/grafana/dashboards.local:ro
    networks:
      - monitoring
    restart: unless-stopped
