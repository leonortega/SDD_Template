global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: blackbox_http_health
    metrics_path: /probe
    params:
      module:
        - http_2xx
    file_sd_configs:
      - files:
          - /etc/prometheus/targets.local.yml
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __address__
        target_label: instance
      - source_labels:
          - environment
        target_label: environment
      - source_labels:
          - app
        target_label: app
      - target_label: __address__
        replacement: blackbox-exporter:9115
