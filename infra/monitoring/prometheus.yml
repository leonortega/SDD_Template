global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: azure-apps
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - replace-dev-app.azurewebsites.net
          - replace-qa-app.azurewebsites.net
          - replace-prod-app.azurewebsites.net
