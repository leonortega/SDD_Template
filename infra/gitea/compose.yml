# NOTE: No `name:` field - inherits parent project name (agentic-e2e) when
# included via infra/compose.yml. Run all services from infra/compose.yml
# to keep volumes and networks consistent.

networks:
  gitea:

volumes:
  gitea-data:
  runner-data:

services:
  gitea:
    image: gitea/gitea:1.26.2
    container_name: agentic-gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__actions__ENABLED: "true"
      GITEA__packages__ENABLED: "false"
      GITEA__admin__USERNAME: admin
      GITEA__admin__PASSWORD: admin123
      GITEA__admin__EMAIL: admin@example.com
      GITEA__admin__MUST_CHANGE_PASSWORD: "false"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    networks:
      - gitea
    restart: unless-stopped

  runner:
    image: gitea/runner:1.0.0
    container_name: agentic-gitea-runner
    depends_on:
      - gitea
    env_file:
      - runner.env
    environment:
      CONFIG_FILE: /config.yml
      KUBECONFIG: /home/runner/.kube/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - runner-data:/data
      - ./config.yml:/config.yml
      - //var/run/docker.sock:/var/run/docker.sock
      - ~/.kube/config:/home/runner/.kube/config:ro
    networks:
      - gitea
    restart: unless-stopped
