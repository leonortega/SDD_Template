# NOTE: No `name:` field - inherits parent project name (agentic-e2e) when
# included via infra/compose.yml.

networks:
  nexus:

volumes:
  nexus-data:

services:
  nexus:
    image: sonatype/nexus3:3.92.2
    container_name: agentic-nexus
    ports:
      - "8088:8081"
      - "5001:5001"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - nexus
    restart: unless-stopped
